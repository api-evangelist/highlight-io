naftiko: 1.0.0-alpha2
info:
  label: Highlight OTLP Traces API — Traces
  description: 'Highlight OTLP Traces API — Traces. 1 operation. Lead operation: Export Trace Service. Self-contained
    Naftiko capability that submits OpenTelemetry trace batches to Highlight.'
  tags:
  - Highlight
  - OpenTelemetry
  - Traces
  - Observability
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    HIGHLIGHT_PROJECT_ID: HIGHLIGHT_PROJECT_ID
    HIGHLIGHT_OTLP_ENDPOINT: HIGHLIGHT_OTLP_ENDPOINT
capability:
  consumes:
  - type: http
    namespace: otlp-traces
    baseUri: '{{env.HIGHLIGHT_OTLP_ENDPOINT}}'
    description: Highlight OTLP Traces ingestion. Self-contained, no shared references.
    resources:
    - name: v1-traces
      path: /v1/traces
      operations:
      - name: exportTraces
        method: POST
        description: Export OpenTelemetry trace batch to Highlight.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: ExportTraceServiceRequest payload (resourceSpans).
          required: true
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: otlp-traces-rest
    port: 8080
    description: REST adapter for Highlight OTLP Traces ingestion.
    resources:
    - path: /v1/v1/traces
      name: v1-traces
      description: REST surface for OTLP trace export.
      operations:
      - method: POST
        name: exportTraces
        description: Export OpenTelemetry trace batch to Highlight.
        call: otlp-traces.exportTraces
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: otlp-traces-mcp
    port: 9090
    transport: http
    description: MCP adapter for Highlight OTLP Traces ingestion.
    tools:
    - name: highlight-export-traces
      description: Export OpenTelemetry trace batch to Highlight.
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: otlp-traces.exportTraces
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
